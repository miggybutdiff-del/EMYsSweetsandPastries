<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<meta name="description" content="EMY's Sweets and Pastries Products">

<title>Products - EMY's Sweets and Pastries</title>

<link rel="icon" type="image/png" href="images/emyslogoo.png">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

<link rel="stylesheet" href="style.css">

<style>
.qty-controls{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px 15px;
}

.qty-controls button{
  border:none;
  background:var(--rose);
  color:#fff;
  width:30px;
  height:30px;
  border-radius:50%;
  transition:.3s;
}

.qty-controls button:hover{
  background:var(--rose-dark);
}

.show-cart-btn{
  background:var(--rose);
  color:#fff;
  border:none;
  border-radius:50px;
  padding:.6rem 1.5rem;
  font-size:.9rem;
}

.show-cart-btn:hover{
  background:var(--rose-dark);
}
</style>

</head>

<body>

<nav class="navbar navbar-expand-lg sticky-top bg-white shadow-sm">
  <div class="container">

    <a class="navbar-brand d-flex align-items-center" href="index.html">
      <img src="images/emyslogoo.png" alt="Logo" style="height:40px;margin-right:10px;">
      <span class="fw-bold">EMY's Sweets & Pastries</span>
    </a>

    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
        <li class="nav-item"><a class="nav-link active-page" href="products.html">Products</a></li>
        <li class="nav-item"><a class="nav-link" href="services.html">Services</a></li>
        <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
      </ul>
    </div>

  </div>
</nav>

<div class="page-header">
  <span class="badge-rose">Check It Out</span>
  <h1>Our Products</h1>
  <p>Choose your favorites and add them to your cart</p>
</div>

<div class="container d-flex justify-content-end">
  <button class="show-cart-btn" onclick="openCart()">
    Show Cart 🛒
  </button>
</div>

<section class="py-5">
  <div class="container">
    <div class="row g-4" id="productContainer"></div>
  </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script>
(function(){
  emailjs.init("vhjcdrAYqWm_aNETv");
})();
</script>

<script>

const products = [
["Almond Tarts","images/almondtart.jpg",169],
["Cashew Tarts","images/cashewtart.jpg",169],
["Mango Tarts","images/MangoTart.jpg",169],
["Peanut Tarts","images/PeanutTart.jpg",169],
["Boat Tarts","images/BoatTart.jpg",189],
["Assorted Tarts","images/AssortedTarts.jpg",169],
["Salted Tamarinds","images/tamarindsalted.jpg",129],
["Sweet Tamarinds","images/tamarindsweet.jpg",129],
["Spicy Tamarind","images/tamarindspicy.jpg",129],
["Barquiron","images/barquiron.jpg",189],
["Polvoron","images/polvoron.jpg",209]
];

let cart = {};

window.onload = () => {
let container=document.getElementById("productContainer");

products.forEach((p,i)=>{
container.innerHTML+=`
<div class="col-sm-6 col-md-4 col-lg-3">
<div class="product-card">

<img src="${p[1]}">

<div class="card-body">
<div class="card-title">${p[0]}</div>
<p class="card-text">Freshly made delicacy</p>
<p class="fw-bold">₱${p[2]}</p>
</div>

<div class="qty-controls">
<button onclick="changeQty(${i},-1)">-</button>
<span id="qty${i}">x0</span>
<button onclick="changeQty(${i},1)">+</button>
</div>

</div>
</div>
`;
});
}

function changeQty(i,change){
let name=products[i][0];

if(!cart[name]) cart[name]={...products[i],qty:0};

cart[name].qty+=change;

if(cart[name].qty<=0) delete cart[name];

document.getElementById("qty"+i).innerText="x"+(cart[name]?.qty||0);
}

function openCart(){
let html="";
let total=0;

for(let key in cart){
let item=cart[key];
let sub=item.qty*item[2];
total+=sub;

html+=`
<div class="d-flex align-items-center mb-3">
<img src="${item[1]}" width="60" class="me-3 rounded">
<div>
<strong>${item[0]}</strong><br>
x${item.qty} = ₱${sub}
</div>
</div>
`;
}

document.getElementById("cartItems").innerHTML=html||"No items yet";
document.getElementById("cartTotal").innerText=total;

new bootstrap.Modal(document.getElementById('cartModal')).show();
}

function confirmOrder(){

if(Object.keys(cart).length === 0){
  alert("Cart is empty");
  return;
}

let email = document.getElementById("customerEmail").value.trim();

function validateEmail(email){
  return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
}

if(!validateEmail(email)){
  document.getElementById("emailError").style.display = "block";
  return;
}else{
  document.getElementById("emailError").style.display = "none";
}

let orderList = "";
let total = 0;

for(let key in cart){
  let item = cart[key];
  let sub = item.qty * item[2];
  total += sub;

  orderList += `${item[0]} (x${item.qty}) = ₱${sub}\n`;
}

let params = {
  from_name: "Website Order",
  from_email: email,
  subject: "New Order Received",
  message: `Customer Email: ${email}\n\n${orderList}\nTotal: ₱${total}`
};

emailjs.send("service_qoyktqr", "template_nwgk7gj", params)
.then(() => {

  bootstrap.Modal.getInstance(document.getElementById('cartModal')).hide();

  setTimeout(()=>{
    new bootstrap.Modal(document.getElementById('successModal')).show();
  },300);

  cart={};

  document.getElementById("customerEmail").value = "";

  products.forEach((p,i)=>{
    document.getElementById("qty"+i).innerText = "x0";
  });

})
.catch((error)=>{
  console.error(error);
  alert("Failed to send order.");
});

}
</script>

<div class="modal fade" id="cartModal">
<div class="modal-dialog modal-dialog-centered modal-lg">
<div class="modal-content p-4">

<div class="d-flex justify-content-between">
<h5>Your Cart</h5>
<button class="btn-close" data-bs-dismiss="modal"></button>
</div>

<div id="cartItems"></div>

<hr>
<h5>Total: ₱<span id="cartTotal"></span></h5>

<input type="email" id="customerEmail" class="form-control mt-2" placeholder="Enter your email" required>
<small id="emailError" style="color:red; display:none;">Please enter a valid email</small>

<button class="btn-rose w-100 mt-2" onclick="confirmOrder()">Confirm Order</button>

</div>
</div>
</div>

<div class="modal fade" id="successModal">
<div class="modal-dialog modal-dialog-centered modal-sm">
<div class="modal-content text-center p-4">

<button class="btn-close ms-auto" data-bs-dismiss="modal"></button>

<h5 class="text-success">Order Successfully Placed ✔</h5>

</div>
</div>
</div>

<footer class="footer py-3">
  <div class="container text-center">
    <p class="mb-0">
      © 2026 EMY's Sweets and Pastries | Made with love 💕
    </p>
    <div class="footer-icons">
      <a href="https://www.facebook.com/EmysSweetsAndPastries" target="_blank" class="footer-icon">
        <i class="bi bi-facebook"></i>
      </a>
    </div>
  </div>
</footer>
  
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
